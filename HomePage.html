<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASCII Art</title>
    <link rel="stylesheet" href="style.css">
    <script src="main.js"></script>
</head>
<body>
    <div class ="container">
    <h1>ASCII Art Generator</h1>
    <h3>Upload an Image to Convert to ASCII Art</h3>

    
    
    <p>Select Image:  
         <input type="file" id="imageUpload" name="imageUpload" accept="image/*">
    
    <div class="btns">
    <button id="convertButton">Convert to ASCII</button>
    
    <a href="rgbPage.html"><button id="rgbButton">Edit RGB Values</button></a>
    </div>
    
    <img id="preview" style=" display: none;" src="ascii-art.png">
    
</body>
</html>

   <script>
document.addEventListener("DOMContentLoaded", () => {
    document.getElementById("convertButton").addEventListener("click", function() {
        const preview = document.getElementById('preview');
        preview.style.display = 'block';
    });
});
</script>
