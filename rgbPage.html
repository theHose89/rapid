<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASCII Art</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js"></script>
</head>
<body>
    <div class ="container">
    <h1>RGB Editor</h1>
    <div class="sliders">
    <p style="color: red;">Red:
    <input type="range" id="redSlider" name="red" min="0" max="255" value="50"oninput="this.nextElementSibling.value = this.value">
    <output>50</output>
    
    <p style="color: green;">Green:
    <input type="range" id="greenSlider" name="green" min="0" max="255" value="50"oninput="this.nextElementSibling.value = this.value">
    <output>50</output>
   
    <p style="color: blue;">Blue:
    <input type="range" id="blueSlider" name="blue" min="0" max="255" value="50"oninput="this.nextElementSibling.value = this.value">
    <output>50</output> 
    
    </div>

    
    <div class="btns">
    <button id="convertButton">Convert to ASCII</button>
    
    <a href="HomePage.html"><button id="rgbButton">Return to Home</button></a>
    </div>
    
    </div>
    
    
    
</body>
</html>
